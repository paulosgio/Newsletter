services:
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    restart: always
  
  api:
    image: paulossrg/newsletter-api:1.0
    ports:
      - "8080:8080"
      - "5432:5432"
    command: npm run dev

  worker:
    image: paulossrg/newsletter-api:1.0
    command: npm run worker